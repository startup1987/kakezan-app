<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>かけざん れんしゅう</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; user-select: none; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-bounce { animation: bounce 1s infinite; }
    </style>
</head>
<body class="bg-gradient-to-b from-cyan-100 to-blue-200 min-h-screen">
    <div id="app"></div>

    <script>
        // データ構造
        const ANIMALS = [
            { id: 'cat', name: 'ネコ', emoji: '🐱', condition: 'はじめての10もん' },
            { id: 'dog', name: 'イヌ', emoji: '🐶', condition: 'ぜんぶせいかい！' },
            { id: 'rabbit', name: 'ウサギ', emoji: '🐰', condition: '5もんれんぞく' },
            { id: 'panda', name: 'パンダ', emoji: '🐼', condition: '3かいプレイ' },
            { id: 'bear', name: 'クマ', emoji: '🐻', condition: 'にがてをせいかい' },
            { id: 'fox', name: 'キツネ', emoji: '🦊', condition: '20もんクリア' },
            { id: 'lion', name: 'ライオン', emoji: '🦁', condition: '30もんクリア' },
            { id: 'tiger', name: 'トラ', emoji: '🐯', condition: 'じこベストこうしん' },
            { id: 'koala', name: 'コアラ', emoji: '🐨', condition: '2かれんぞく' },
            { id: 'pig', name: 'ブタ', emoji: '🐷', condition: '50もんせいかい' },
            { id: 'cow', name: 'ウシ', emoji: '🐮', condition: '100もんせいかい' },
            { id: 'monkey', name: 'サル', emoji: '🐵', condition: '7のだんマスター' },
            { id: 'chicken', name: 'ニワトリ', emoji: '🐔', condition: '5かれんぞく' },
            { id: 'penguin', name: 'ペンギン', emoji: '🐧', condition: 'ひっさんチャレンジ' },
            { id: 'frog', name: 'カエル', emoji: '🐸', condition: '10もん10びょう' },
            { id: 'turtle', name: 'カメ', emoji: '🐢', condition: 'じっくりがんばった' },
            { id: 'elephant', name: 'ゾウ', emoji: '🐘', condition: '200もんせいかい' },
            { id: 'giraffe', name: 'キリン', emoji: '🦒', condition: '8のだんマスター' },
            { id: 'zebra', name: 'シマウマ', emoji: '🦓', condition: '9のだんマスター' },
            { id: 'dolphin', name: 'イルカ', emoji: '🐬', condition: 'ぜんぶコンプリート！' },
        ];

        // アプリの状態
        let state = {
            screen: 'home',
            mode: 'kuku',
            questionCount: 10,
            questions: [],
            currentIndex: 0,
            answers: [],
            startTime: 0,
            input: '',
            feedback: '',
            hint: '',
            attempts: 0,
            soundEnabled: true,
            lessonSlide: 0,
            userData: loadUserData()
        };

        // 音声機能（Web Audio API）
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(frequency, duration, type = 'sine') {
            if (!state.soundEnabled) return;

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = type;

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function playCorrectSound() {
            // ピロリーン♪（上昇音）
            playSound(523.25, 0.1); // ド
            setTimeout(() => playSound(659.25, 0.1), 100); // ミ
            setTimeout(() => playSound(783.99, 0.2), 200); // ソ
        }

        function playIncorrectSound() {
            // ブブー（下降音）
            playSound(300, 0.15, 'sawtooth');
            setTimeout(() => playSound(200, 0.25, 'sawtooth'), 150);
        }

        function toggleSound() {
            state.soundEnabled = !state.soundEnabled;
            localStorage.setItem('kakezan-sound', state.soundEnabled);
            render();
        }

        function playAnimalSound(animalId) {
            if (!state.soundEnabled) return;

            // 音声合成APIを使って動物の鳴き声を再生
            const utterance = new SpeechSynthesisUtterance();

            // 各動物の鳴き声
            const animalVoices = {
                cat: { text: 'ニャー、ニャー', pitch: 1.5, rate: 1.0 },
                dog: { text: 'ワン、ワン、ワン', pitch: 0.8, rate: 1.1 },
                rabbit: { text: 'ピョン、ピョン', pitch: 1.6, rate: 1.2 },
                panda: { text: 'クォン、クォン', pitch: 1.0, rate: 0.9 },
                bear: { text: 'グオー', pitch: 0.6, rate: 0.8 },
                fox: { text: 'コン、コン、コン', pitch: 1.4, rate: 1.0 },
                lion: { text: 'ガオー', pitch: 0.5, rate: 0.7 },
                tiger: { text: 'ウォー', pitch: 0.6, rate: 0.8 },
                koala: { text: 'クゥ、クゥ', pitch: 1.3, rate: 1.0 },
                pig: { text: 'ブー、ブー、ブー', pitch: 1.0, rate: 1.0 },
                cow: { text: 'モー、モー', pitch: 0.7, rate: 0.9 },
                monkey: { text: 'キー、キー、キー', pitch: 1.7, rate: 1.3 },
                chicken: { text: 'コケコッコー', pitch: 1.2, rate: 1.1 },
                penguin: { text: 'クェー、クェー', pitch: 1.1, rate: 1.0 },
                frog: { text: 'ケロケロ、ケロ', pitch: 1.0, rate: 1.2 },
                turtle: { text: 'フー', pitch: 0.9, rate: 0.7 },
                elephant: { text: 'パオーン', pitch: 0.5, rate: 0.8 },
                giraffe: { text: 'ンー', pitch: 1.0, rate: 0.9 },
                zebra: { text: 'ヒヒーン', pitch: 1.1, rate: 1.0 },
                dolphin: { text: 'キュー、キュー、キュー', pitch: 1.8, rate: 1.2 }
            };

            if (animalVoices[animalId]) {
                const voice = animalVoices[animalId];
                utterance.text = voice.text;
                utterance.pitch = voice.pitch;
                utterance.rate = voice.rate;
                utterance.volume = 0.8;
                utterance.lang = 'ja-JP';

                window.speechSynthesis.cancel(); // 前の音声をキャンセル
                window.speechSynthesis.speak(utterance);
            }
        }

        // ローカルストレージ
        function loadUserData() {
            const stored = localStorage.getItem('kakezan-data');
            const soundSetting = localStorage.getItem('kakezan-sound');
            if (soundSetting !== null) {
                state.soundEnabled = soundSetting === 'true';
            }
            if (stored) return JSON.parse(stored);
            return {
                animals: ANIMALS.map(a => ({ ...a, unlocked: false })),
                stats: {
                    totalSessions: 0,
                    totalQuestions: 0,
                    correctAnswers: 0,
                    incorrectAnswers: 0,
                    bestTime: 0,
                    bestAccuracy: 0,
                    wrongQuestions: [],
                    lastPlayedDate: '',
                    consecutiveDays: 0
                },
                sessions: []
            };
        }

        function saveUserData() {
            localStorage.setItem('kakezan-data', JSON.stringify(state.userData));
        }

        // 問題生成
        function generateQuestions(mode, count) {
            const questions = [];
            for (let i = 0; i < count; i++) {
                if (mode === 'kuku') {
                    const num1 = Math.floor(Math.random() * 9) + 1;
                    const num2 = Math.floor(Math.random() * 9) + 1;
                    questions.push({ num1, num2, answer: num1 * num2, mode: 'kuku' });
                } else if (mode === 'wari') {
                    // 割り算：九九の範囲で割り切れる問題のみ
                    const num2 = Math.floor(Math.random() * 9) + 1; // 割る数（1〜9）
                    const answer = Math.floor(Math.random() * 9) + 1; // 答え（1〜9）
                    const num1 = num2 * answer; // 割られる数（必ず割り切れる）
                    questions.push({ num1, num2, answer, mode: 'wari' });
                } else {
                    const num1 = Math.floor(Math.random() * 90) + 10;
                    const num2 = Math.floor(Math.random() * 9) + 1;
                    questions.push({ num1, num2, answer: num1 * num2, mode: 'hissan' });
                }
            }
            return questions;
        }

        // 励ましメッセージ
        function getEncouragement(isCorrect) {
            if (isCorrect) {
                const msgs = ['いいね！', 'すごい！', 'せいかい！', 'やったね！', 'はやい！', 'バッチリ！', 'さすが！'];
                return msgs[Math.floor(Math.random() * msgs.length)];
            }
            return ['つぎいこう！', 'おしい！', 'がんばろう！'][Math.floor(Math.random() * 3)];
        }

        // 時間フォーマット
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return mins > 0 ? `${mins}分${secs}秒` : `${secs}秒`;
        }

        // クイズ開始
        function startQuiz(mode, count) {
            state.mode = mode;
            state.questionCount = count;
            state.questions = generateQuestions(mode, count);
            state.currentIndex = 0;
            state.answers = Array(count).fill(null);
            state.startTime = Date.now();
            state.input = '';
            state.feedback = '';
            state.hint = '';
            state.attempts = 0;
            state.screen = 'quiz';
            render();
        }

        // 回答処理
        function handleAnswer(value) {
            const q = state.questions[state.currentIndex];
            const isCorrect = value === q.answer;

            if (isCorrect) {
                playCorrectSound(); // 正解音を鳴らす
                state.feedback = getEncouragement(true);
                state.answers[state.currentIndex] = value;
                setTimeout(() => {
                    state.feedback = '';
                    state.input = '';
                    state.attempts = 0;
                    if (state.currentIndex < state.questions.length - 1) {
                        state.currentIndex++;
                        render();
                    } else {
                        completeQuiz();
                    }
                }, 1000);
            } else {
                playIncorrectSound(); // 不正解音を鳴らす
                state.feedback = getEncouragement(false);
                state.attempts++;

                // 割り算のとき、2回目以降はヒントを表示
                if (q.mode === 'wari' && state.attempts >= 2) {
                    state.hint = `ヒント：${q.num2} × ？ = ${q.num1} を かんがえよう！（${q.num2}のだん）`;
                } else {
                    state.hint = '';
                }

                if (state.attempts >= 3) {
                    state.answers[state.currentIndex] = null;
                    state.hint = '';
                    setTimeout(() => {
                        state.feedback = '';
                        state.input = '';
                        state.attempts = 0;
                        if (state.currentIndex < state.questions.length - 1) {
                            state.currentIndex++;
                            render();
                        } else {
                            completeQuiz();
                        }
                    }, 2500);
                } else {
                    setTimeout(() => {
                        state.feedback = '';
                        state.input = '';
                        render();
                    }, 1200);
                }
            }
            render();
        }

        // クイズ完了
        function completeQuiz() {
            const endTime = Date.now();
            const correctCount = state.answers.filter((a, i) => a === state.questions[i].answer).length;
            const totalTime = Math.floor((endTime - state.startTime) / 1000);
            const accuracy = Math.round((correctCount / state.questions.length) * 100);

            // 統計更新
            const today = new Date().toDateString();
            let consecutiveDays = state.userData.stats.consecutiveDays;
            if (state.userData.stats.lastPlayedDate !== today) {
                const lastDate = new Date(state.userData.stats.lastPlayedDate);
                const todayDate = new Date(today);
                const diffDays = Math.floor((todayDate - lastDate) / (1000 * 60 * 60 * 24));
                if (diffDays === 1) {
                    consecutiveDays++;
                } else if (diffDays > 1 || !state.userData.stats.lastPlayedDate) {
                    consecutiveDays = 1;
                }
            }

            const wrongQuestions = state.questions.filter((q, i) => state.answers[i] !== q.answer);

            state.userData.stats = {
                totalSessions: state.userData.stats.totalSessions + 1,
                totalQuestions: state.userData.stats.totalQuestions + state.questions.length,
                correctAnswers: state.userData.stats.correctAnswers + correctCount,
                incorrectAnswers: state.userData.stats.incorrectAnswers + (state.questions.length - correctCount),
                bestTime: state.userData.stats.bestTime === 0 || totalTime < state.userData.stats.bestTime ? totalTime : state.userData.stats.bestTime,
                bestAccuracy: Math.max(state.userData.stats.bestAccuracy, accuracy),
                wrongQuestions: [...state.userData.stats.wrongQuestions, ...wrongQuestions].slice(-50),
                lastPlayedDate: today,
                consecutiveDays
            };

            // 動物カード解放
            const newAnimals = checkUnlockAnimals(correctCount, accuracy);

            saveUserData();
            state.screen = 'result';
            state.newAnimals = newAnimals;
            state.endTime = endTime;
            render();
        }

        // 動物カード解放チェック
        function checkUnlockAnimals(correctCount, accuracy) {
            const newUnlocked = [];
            const stats = state.userData.stats;

            const conditions = {
                cat: stats.totalSessions >= 1,
                dog: correctCount === state.questions.length,
                rabbit: hasConsecutiveCorrect(5),
                panda: stats.totalSessions >= 3,
                fox: state.questions.length >= 20 && correctCount >= 18,
                lion: state.questions.length >= 30 && correctCount >= 27,
                koala: stats.consecutiveDays >= 2,
                pig: stats.correctAnswers >= 50,
                cow: stats.correctAnswers >= 100,
                chicken: stats.consecutiveDays >= 5
            };

            state.userData.animals = state.userData.animals.map(animal => {
                if (!animal.unlocked && conditions[animal.id]) {
                    newUnlocked.push(animal.emoji);
                    return { ...animal, unlocked: true, unlockedAt: Date.now() };
                }
                return animal;
            });

            return newUnlocked;
        }

        function hasConsecutiveCorrect(count) {
            let consecutive = 0;
            for (let i = 0; i < state.answers.length; i++) {
                if (state.answers[i] === state.questions[i].answer) {
                    consecutive++;
                    if (consecutive >= count) return true;
                } else {
                    consecutive = 0;
                }
            }
            return false;
        }

        // 数字パッド
        function NumberPad() {
            return `
                <div class="w-full max-w-md mx-auto">
                    <div class="bg-white border-4 border-gray-300 rounded-2xl p-6 mb-4 min-h-[80px] flex items-center justify-center">
                        <span class="text-5xl font-bold text-gray-800">${state.input || '?'}</span>
                    </div>
                    <div class="grid grid-cols-3 gap-3 mb-3">
                        ${[1,2,3,4,5,6,7,8,9].map(n => `
                            <button onclick="addDigit(${n})" class="bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white text-4xl font-bold rounded-xl h-20">
                                ${n}
                            </button>
                        `).join('')}
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="deleteDigit()" class="bg-gray-400 hover:bg-gray-500 active:bg-gray-600 text-white text-2xl font-bold rounded-xl h-20">⌫</button>
                        <button onclick="addDigit(0)" class="bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white text-4xl font-bold rounded-xl h-20">0</button>
                        <button onclick="submitAnswer()" ${!state.input ? 'disabled' : ''} class="${state.input ? 'bg-green-500 hover:bg-green-600 active:bg-green-700' : 'bg-gray-300'} text-white text-2xl font-bold rounded-xl h-20">けってい</button>
                    </div>
                </div>
            `;
        }

        function addDigit(n) {
            if (state.input.length < 4) {
                state.input += n;
                render();
            }
        }

        function deleteDigit() {
            state.input = state.input.slice(0, -1);
            render();
        }

        function submitAnswer() {
            if (state.input) {
                handleAnswer(parseInt(state.input));
            }
        }

        // 画面レンダリング
        function render() {
            const app = document.getElementById('app');

            if (state.screen === 'home') {
                app.innerHTML = HomeScreen();
            } else if (state.screen === 'quiz') {
                app.innerHTML = QuizScreen();
            } else if (state.screen === 'result') {
                app.innerHTML = ResultScreen();
            } else if (state.screen === 'collection') {
                app.innerHTML = CollectionScreen();
            } else if (state.screen === 'stats') {
                app.innerHTML = StatsScreen();
            } else if (state.screen === 'lesson') {
                app.innerHTML = LessonScreen();
            }
        }

        function HomeScreen() {
            const unlockedCount = state.userData.animals.filter(a => a.unlocked).length;
            const totalAccuracy = state.userData.stats.totalQuestions > 0
                ? Math.round((state.userData.stats.correctAnswers / state.userData.stats.totalQuestions) * 100)
                : 0;

            return `
                <div class="max-w-2xl mx-auto p-4">
                    <h1 class="text-5xl font-bold text-center mb-4 text-gray-800 mt-8">かけざん れんしゅう</h1>
                    <div class="text-center text-xl text-gray-600 mb-8">たのしく まなぼう！</div>

                    <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
                        <div class="grid grid-cols-3 gap-4 text-center">
                            <div>
                                <div class="text-3xl font-bold text-blue-600">${unlockedCount}</div>
                                <div class="text-sm text-gray-600">どうぶつ</div>
                            </div>
                            <div>
                                <div class="text-3xl font-bold text-green-600">${totalAccuracy}%</div>
                                <div class="text-sm text-gray-600">せいかいりつ</div>
                            </div>
                            <div>
                                <div class="text-3xl font-bold text-orange-600">${state.userData.stats.consecutiveDays}</div>
                                <div class="text-sm text-gray-600">れんぞく</div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-4 mb-6">
                        <div class="bg-white rounded-2xl shadow-lg p-6">
                            <h2 class="text-2xl font-bold mb-4 text-gray-800">九九スピードれんしゅう</h2>
                            <div class="grid grid-cols-3 gap-3">
                                <button onclick="startQuiz('kuku', 10)" class="bg-blue-500 hover:bg-blue-600 text-white text-xl font-bold py-4 rounded-xl">10もん</button>
                                <button onclick="startQuiz('kuku', 20)" class="bg-blue-500 hover:bg-blue-600 text-white text-xl font-bold py-4 rounded-xl">20もん</button>
                                <button onclick="startQuiz('kuku', 30)" class="bg-blue-500 hover:bg-blue-600 text-white text-xl font-bold py-4 rounded-xl">30もん</button>
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl shadow-lg p-6">
                            <div class="flex justify-between items-center mb-4">
                                <h2 class="text-2xl font-bold text-gray-800">わり算れんしゅう</h2>
                                <button onclick="goToLesson()" class="bg-yellow-400 hover:bg-yellow-500 text-white text-sm font-bold px-4 py-2 rounded-xl">
                                    📖 べんきょうする
                                </button>
                            </div>
                            <div class="grid grid-cols-3 gap-3">
                                <button onclick="startQuiz('wari', 10)" class="bg-orange-500 hover:bg-orange-600 text-white text-xl font-bold py-4 rounded-xl">10もん</button>
                                <button onclick="startQuiz('wari', 20)" class="bg-orange-500 hover:bg-orange-600 text-white text-xl font-bold py-4 rounded-xl">20もん</button>
                                <button onclick="startQuiz('wari', 30)" class="bg-orange-500 hover:bg-orange-600 text-white text-xl font-bold py-4 rounded-xl">30もん</button>
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl shadow-lg p-6">
                            <h2 class="text-2xl font-bold mb-4 text-gray-800">ひっさんチャレンジ</h2>
                            <div class="grid grid-cols-3 gap-3">
                                <button onclick="startQuiz('hissan', 10)" class="bg-purple-500 hover:bg-purple-600 text-white text-xl font-bold py-4 rounded-xl">10もん</button>
                                <button onclick="startQuiz('hissan', 20)" class="bg-purple-500 hover:bg-purple-600 text-white text-xl font-bold py-4 rounded-xl">20もん</button>
                                <button onclick="startQuiz('hissan', 30)" class="bg-purple-500 hover:bg-purple-600 text-white text-xl font-bold py-4 rounded-xl">30もん</button>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <button onclick="goToCollection()" class="bg-green-500 hover:bg-green-600 text-white text-xl font-bold py-6 rounded-xl">🐾 コレクション</button>
                        <button onclick="goToStats()" class="bg-yellow-500 hover:bg-yellow-600 text-white text-xl font-bold py-6 rounded-xl">📊 きろく</button>
                    </div>

                    <div class="bg-white rounded-2xl shadow-lg p-4">
                        <button onclick="toggleSound()" class="w-full flex items-center justify-between text-lg font-bold text-gray-800">
                            <span>おとエフェクト</span>
                            <span class="text-2xl">${state.soundEnabled ? '🔊 ON' : '🔇 OFF'}</span>
                        </button>
                    </div>
                </div>
            `;
        }

        function QuizScreen() {
            const q = state.questions[state.currentIndex];
            const progress = state.currentIndex + 1;
            const progressPercent = (progress / state.questionCount) * 100;

            return `
                <div class="min-h-screen bg-gradient-to-b from-blue-100 to-purple-100 p-4">
                    <div class="max-w-2xl mx-auto">
                        <div class="flex justify-between items-center mb-6">
                            <button onclick="goHome()" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded-xl text-lg font-bold">◀ もどる</button>
                            <div class="text-2xl font-bold text-gray-800">${progress} / ${state.questionCount}</div>
                        </div>

                        <div class="bg-white rounded-full h-4 mb-8 overflow-hidden">
                            <div class="bg-green-500 h-full transition-all duration-500" style="width: ${progressPercent}%"></div>
                        </div>

                        <div class="bg-white rounded-3xl shadow-xl p-8 mb-6">
                            <div class="text-center mb-8">
                                <div class="text-7xl font-bold text-gray-800 mb-4">
                                    ${q.mode === 'wari'
                                        ? `${q.num1} ÷ ${q.num2}`
                                        : `${q.num1} × ${q.num2}`}
                                </div>
                                <div class="text-4xl text-gray-600">= ?</div>
                            </div>

                            ${state.hint ? `
                                <div class="bg-yellow-50 border-2 border-yellow-300 rounded-2xl p-4 mb-4">
                                    <div class="text-xl font-bold text-yellow-700">💡 ${state.hint}</div>
                                </div>
                            ` : ''}

                            ${state.feedback ? `
                                <div class="text-center text-3xl font-bold mb-4 ${state.feedback.includes('いいね') || state.feedback.includes('すごい') || state.feedback.includes('せいかい') || state.feedback.includes('やった') || state.feedback.includes('はやい') || state.feedback.includes('バッチリ') || state.feedback.includes('さすが') ? 'text-green-600' : 'text-orange-600'}">
                                    ${state.feedback}
                                </div>
                            ` : NumberPad()}
                        </div>
                    </div>
                </div>
            `;
        }

        function ResultScreen() {
            const correctCount = state.answers.filter((a, i) => a === state.questions[i].answer).length;
            const totalTime = Math.floor((state.endTime - state.startTime) / 1000);
            const accuracy = Math.round((correctCount / state.questions.length) * 100);

            return `
                <div class="min-h-screen bg-gradient-to-b from-yellow-100 to-orange-100 p-4">
                    <div class="max-w-2xl mx-auto">
                        <div class="bg-white rounded-3xl shadow-xl p-8 mb-6">
                            <h1 class="text-4xl font-bold text-center mb-8 text-gray-800">おつかれさま！</h1>

                            <div class="grid grid-cols-3 gap-4 mb-8">
                                <div class="bg-blue-100 rounded-2xl p-6 text-center">
                                    <div class="text-5xl font-bold text-blue-600 mb-2">${correctCount}</div>
                                    <div class="text-lg text-gray-700">せいかい</div>
                                </div>
                                <div class="bg-green-100 rounded-2xl p-6 text-center">
                                    <div class="text-5xl font-bold text-green-600 mb-2">${accuracy}%</div>
                                    <div class="text-lg text-gray-700">せいかいりつ</div>
                                </div>
                                <div class="bg-purple-100 rounded-2xl p-6 text-center">
                                    <div class="text-4xl font-bold text-purple-600 mb-2">${formatTime(totalTime)}</div>
                                    <div class="text-lg text-gray-700">タイム</div>
                                </div>
                            </div>

                            ${state.newAnimals && state.newAnimals.length > 0 ? `
                                <div class="bg-gradient-to-r from-pink-100 to-yellow-100 rounded-2xl p-6 mb-6">
                                    <div class="text-2xl font-bold text-center mb-4 text-gray-800">🎉 あたらしいカードをゲット！</div>
                                    <div class="flex justify-center gap-4 flex-wrap">
                                        ${state.newAnimals.map(emoji => `<div class="text-6xl animate-bounce">${emoji}</div>`).join('')}
                                    </div>
                                </div>
                            ` : ''}

                            <div class="text-center mb-6">
                                <p class="text-2xl text-gray-700">
                                    ${accuracy === 100 ? 'かんぺき！すごいぞ！' : accuracy >= 80 ? 'よくがんばったね！' : accuracy >= 60 ? 'いいちょうし！つづけよう！' : 'つぎはもっとよくなるよ！'}
                                </p>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <button onclick="startQuiz('${state.mode}', ${state.questionCount})" class="bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold py-4 rounded-xl">もういちど</button>
                                <button onclick="goHome()" class="bg-green-500 hover:bg-green-600 text-white text-2xl font-bold py-4 rounded-xl">ホームへ</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function CollectionScreen() {
            const unlockedCount = state.userData.animals.filter(a => a.unlocked).length;

            return `
                <div class="min-h-screen bg-gradient-to-b from-green-100 to-blue-100 p-4">
                    <div class="max-w-4xl mx-auto">
                        <div class="flex justify-between items-center mb-6">
                            <button onclick="goHome()" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded-xl text-lg font-bold">◀ もどる</button>
                            <div class="text-2xl font-bold text-gray-800">${unlockedCount} / ${state.userData.animals.length}</div>
                        </div>

                        <h1 class="text-4xl font-bold text-center mb-8 text-gray-800">どうぶつコレクション</h1>

                        <div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                            ${state.userData.animals.map(animal => `
                                <div onclick="${animal.unlocked ? `playAnimalSound('${animal.id}')` : ''}" class="${animal.unlocked ? 'bg-white cursor-pointer' : 'bg-gray-300'} rounded-2xl p-4 shadow-lg transition-transform ${animal.unlocked ? 'hover:scale-110 active:scale-95' : ''}">
                                    <div class="text-6xl text-center mb-2">${animal.unlocked ? animal.emoji : '❓'}</div>
                                    <div class="text-center">
                                        <div class="text-lg font-bold mb-1 ${animal.unlocked ? 'text-gray-800' : 'text-gray-500'}">${animal.unlocked ? animal.name : '???'}</div>
                                        <div class="text-xs ${animal.unlocked ? 'text-gray-600' : 'text-gray-400'}">${animal.condition}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        ${unlockedCount < state.userData.animals.length ? `
                            <div class="mt-8 bg-white rounded-2xl p-6 text-center">
                                <p class="text-xl text-gray-700">れんしゅうをつづけて、すべてのどうぶつをあつめよう！</p>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function StatsScreen() {
            const stats = state.userData.stats;
            const totalAccuracy = stats.totalQuestions > 0 ? Math.round((stats.correctAnswers / stats.totalQuestions) * 100) : 0;

            const weakTables = {};
            stats.wrongQuestions.forEach(q => {
                if (q.num1 <= 9 && q.num2 <= 9) {
                    weakTables[q.num2] = (weakTables[q.num2] || 0) + 1;
                }
            });
            const topWeak = Object.entries(weakTables).sort((a, b) => b[1] - a[1]).slice(0, 3);

            return `
                <div class="min-h-screen bg-gradient-to-b from-purple-100 to-pink-100 p-4">
                    <div class="max-w-2xl mx-auto">
                        <div class="mb-6">
                            <button onclick="goHome()" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded-xl text-lg font-bold">◀ もどる</button>
                        </div>

                        <h1 class="text-4xl font-bold text-center mb-8 text-gray-800">きろく</h1>

                        <div class="bg-white rounded-3xl shadow-xl p-6 mb-6">
                            <h2 class="text-2xl font-bold mb-4 text-gray-800">がんばりきろく</h2>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-blue-50 rounded-xl p-4">
                                    <div class="text-sm text-gray-600 mb-1">ぜんぶのもんだい</div>
                                    <div class="text-3xl font-bold text-blue-600">${stats.totalQuestions}</div>
                                </div>
                                <div class="bg-green-50 rounded-xl p-4">
                                    <div class="text-sm text-gray-600 mb-1">せいかいりつ</div>
                                    <div class="text-3xl font-bold text-green-600">${totalAccuracy}%</div>
                                </div>
                                <div class="bg-purple-50 rounded-xl p-4">
                                    <div class="text-sm text-gray-600 mb-1">プレイかいすう</div>
                                    <div class="text-3xl font-bold text-purple-600">${stats.totalSessions}</div>
                                </div>
                                <div class="bg-orange-50 rounded-xl p-4">
                                    <div class="text-sm text-gray-600 mb-1">れんぞくにっすう</div>
                                    <div class="text-3xl font-bold text-orange-600">${stats.consecutiveDays}</div>
                                </div>
                            </div>
                        </div>

                        ${stats.bestTime > 0 ? `
                            <div class="bg-white rounded-3xl shadow-xl p-6 mb-6">
                                <h2 class="text-2xl font-bold mb-4 text-gray-800">ベストきろく</h2>
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="bg-yellow-50 rounded-xl p-4">
                                        <div class="text-sm text-gray-600 mb-1">さいこうせいかいりつ</div>
                                        <div class="text-3xl font-bold text-yellow-600">${stats.bestAccuracy}%</div>
                                    </div>
                                    <div class="bg-pink-50 rounded-xl p-4">
                                        <div class="text-sm text-gray-600 mb-1">さいたんタイム</div>
                                        <div class="text-2xl font-bold text-pink-600">${formatTime(stats.bestTime)}</div>
                                    </div>
                                </div>
                            </div>
                        ` : ''}

                        ${topWeak.length > 0 ? `
                            <div class="bg-white rounded-3xl shadow-xl p-6 mb-6">
                                <h2 class="text-2xl font-bold mb-4 text-gray-800">にがてなだん</h2>
                                <div class="space-y-3">
                                    ${topWeak.map(([table, count]) => `
                                        <div class="bg-red-50 rounded-xl p-4 flex justify-between items-center">
                                            <span class="text-xl font-bold text-gray-800">${table}のだん</span>
                                            <span class="text-lg text-gray-600">まちがい ${count}かい</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        // 割り算授業画面
        function LessonScreen() {
            const slides = [
                {
                    title: 'わり算って なあに？',
                    content: `
                        <div class="text-center">
                            <div class="text-6xl mb-6">🍎🍎🍎🍎🍎🍎🍎🍎🍎🍎🍎🍎</div>
                            <p class="text-2xl text-gray-700 mb-4">りんごが <span class="text-red-500 font-bold">12こ</span> あります</p>
                            <p class="text-2xl text-gray-700 mb-4"><span class="text-blue-500 font-bold">3にん</span> で おなじかずずつ わけると…</p>
                            <p class="text-2xl text-gray-700">ひとり <span class="text-green-500 font-bold text-3xl">なんこ</span> もらえるかな？</p>
                        </div>
                    `
                },
                {
                    title: 'わけてみよう！',
                    content: `
                        <div class="text-center">
                            <div class="grid grid-cols-3 gap-4 mb-6">
                                <div class="bg-red-50 rounded-xl p-3">
                                    <div class="text-3xl mb-1">😊</div>
                                    <div class="text-2xl">🍎🍎🍎🍎</div>
                                    <div class="text-sm text-gray-600 mt-1">4こ</div>
                                </div>
                                <div class="bg-blue-50 rounded-xl p-3">
                                    <div class="text-3xl mb-1">😊</div>
                                    <div class="text-2xl">🍎🍎🍎🍎</div>
                                    <div class="text-sm text-gray-600 mt-1">4こ</div>
                                </div>
                                <div class="bg-green-50 rounded-xl p-3">
                                    <div class="text-3xl mb-1">😊</div>
                                    <div class="text-2xl">🍎🍎🍎🍎</div>
                                    <div class="text-sm text-gray-600 mt-1">4こ</div>
                                </div>
                            </div>
                            <p class="text-2xl font-bold text-gray-800">
                                12 ÷ 3 = <span class="text-green-500">4</span>
                            </p>
                            <p class="text-lg text-gray-600 mt-2">ひとり 4こ ずつ！</p>
                        </div>
                    `
                },
                {
                    title: 'かけ算で かんがえよう！',
                    content: `
                        <div class="text-center">
                            <p class="text-xl text-gray-700 mb-6">わり算は かけ算の ぎゃくだよ！</p>
                            <div class="bg-yellow-50 rounded-2xl p-6 mb-4">
                                <p class="text-2xl font-bold text-gray-800 mb-2">12 ÷ 3 = ？</p>
                                <p class="text-xl text-gray-600">↓ こう かんがえる！</p>
                                <p class="text-2xl font-bold text-blue-600 mt-2">3 × ？ = 12</p>
                                <p class="text-xl text-gray-600 mt-2">3のだんを おもいだそう！</p>
                                <p class="text-2xl font-bold text-green-600 mt-2">3 × 4 = 12 → こたえは <span class="text-3xl">4</span>！</p>
                            </div>
                            <p class="text-lg text-gray-600">九九が わかれば わり算も できる！</p>
                        </div>
                    `
                },
                {
                    title: 'じゃあ れんしゅうしてみよう！',
                    content: `
                        <div class="text-center">
                            <div class="text-8xl mb-6">🎯</div>
                            <p class="text-2xl text-gray-700 mb-4">まず <span class="text-blue-500 font-bold">わる数</span> の だんの 九九を おもいだして、</p>
                            <p class="text-2xl text-gray-700 mb-4">こたえが <span class="text-red-500 font-bold">わられる数</span> に なるものを さがそう！</p>
                            <div class="bg-green-50 rounded-2xl p-4 mt-4">
                                <p class="text-xl text-green-700 font-bold">ゆっくりでいい！まちがえても OK！</p>
                            </div>
                        </div>
                    `
                }
            ];

            const slide = slides[state.lessonSlide || 0];
            const slideIndex = state.lessonSlide || 0;
            const isLast = slideIndex === slides.length - 1;

            return `
                <div class="min-h-screen bg-gradient-to-b from-yellow-50 to-orange-100 p-4">
                    <div class="max-w-2xl mx-auto">
                        <div class="flex justify-between items-center mb-6">
                            <button onclick="goHome()" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded-xl text-lg font-bold">◀ もどる</button>
                            <div class="text-xl text-gray-600 font-bold">${slideIndex + 1} / ${slides.length}</div>
                        </div>

                        <div class="bg-white rounded-3xl shadow-xl p-8 mb-6">
                            <h2 class="text-3xl font-bold text-center mb-8 text-orange-600">${slide.title}</h2>
                            ${slide.content}
                        </div>

                        <div class="flex gap-4">
                            ${slideIndex > 0 ? `
                                <button onclick="lessonPrev()" class="flex-1 bg-gray-400 hover:bg-gray-500 text-white text-xl font-bold py-4 rounded-xl">
                                    ◀ まえへ
                                </button>
                            ` : '<div class="flex-1"></div>'}

                            ${isLast ? `
                                <button onclick="startQuiz('wari', 10)" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white text-xl font-bold py-4 rounded-xl">
                                    れんしゅう スタート！🎯
                                </button>
                            ` : `
                                <button onclick="lessonNext()" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white text-xl font-bold py-4 rounded-xl">
                                    つぎへ ▶
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }

        function lessonNext() {
            state.lessonSlide = (state.lessonSlide || 0) + 1;
            render();
        }

        function lessonPrev() {
            state.lessonSlide = Math.max(0, (state.lessonSlide || 0) - 1);
            render();
        }

        // ナビゲーション
        function goHome() {
            state.screen = 'home';
            render();
        }

        function goToCollection() {
            state.screen = 'collection';
            render();
        }

        function goToStats() {
            state.screen = 'stats';
            render();
        }

        function goToLesson() {
            state.screen = 'lesson';
            state.lessonSlide = 0;
            render();
        }

        // 初回レンダリング
        render();
    </script>
</body>
</html>
